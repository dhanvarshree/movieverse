<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover movies, TV shows, and anime on MovieVerse.">
    <title>{% block title %}MovieVerse{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>
<body>
    <nav class="nav">
        <a class="logo" href="{{ url_for('home') }}">🎬 MovieVerse</a>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('explore') }}">Explore</a>
        </div>
        <form class="search-form" action="{{ url_for('search') }}" method="get">
            <label class="sr-only" for="site-search">Search movies, TV shows, and anime</label>
            <input
                id="site-search"
                type="search"
                name="q"
                value="{{ query|default('') }}"
                placeholder="Search movies, TV & anime"
                required
            >
            <button type="submit" aria-label="Search">Search</button>
        </form>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>MovieVerse © 2026 · Data provided by TMDB</footer>
</body>
</html>
